name: "Agentes IA - Ejecucion Diaria"

on:
  schedule:
    # Corre todos los dias a las 12:00 UTC (9:00 AM Argentina)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite ejecucion manual desde GitHub

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: "Activar agentes IA"
        run: |
          echo "Ejecutando cron de agentes IA..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://ia-negocio.vercel.app/api/cron/daily-agents")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Cron fallo con codigo $HTTP_CODE"
            exit 1
          fi

          echo "Agentes ejecutados correctamente"

      - name: "Verificar sitio online"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://ia-negocio.vercel.app")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ALERTA: El sitio no responde (codigo $HTTP_CODE)"
            exit 1
          fi
          echo "Sitio online OK"
